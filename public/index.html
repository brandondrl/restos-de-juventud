<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Monitor de Cortes · Restos de Juventud</title>
<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --border:#334155;--amber:#f59e0b;--amber2:#fbbf24;
  --red-bg:#450a0a;--red-bd:#b91c1c;--red-t:#fca5a5;
  --grn-bg:#052e16;--grn-bd:#15803d;--grn-t:#86efac;
  --ora-bg:#431407;--ora-bd:#c2410c;--ora-t:#fed7aa;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
svg{overflow:hidden;flex-shrink:0;}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;width:100%;max-width:380px;}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.auth-title{font-size:20px;font-weight:700;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:14px;font-weight:500;border-bottom:2px solid transparent;}
.auth-tab.active{color:var(--amber);border-bottom-color:var(--amber);}
.auth-err{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red-t);padding:8px 12px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;}
.auth-note{font-size:11px;color:var(--text3);margin-top:14px;line-height:1.5;text-align:center;}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.hleft{display:flex;align-items:center;gap:10px;}
.htitle{font-size:15px;font-weight:600;}
.hsub{font-size:11px;color:var(--text2);margin-top:1px;}
.hright{display:flex;align-items:center;gap:8px;}
.badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.badge .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bon{background:var(--grn-bg);border:1px solid var(--grn-bd);color:var(--grn-t);}
.boff{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red-t);}
.bon .dot{background:#22c55e;}
.boff .dot{background:#ef4444;animation:pulse 1.5s infinite;}
.profile-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;touch-action:manipulation;}

/* Tabs */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;}
.tab{flex:1;min-height:50px;padding:6px 2px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-bottom:2px solid transparent;font-size:10px;font-weight:500;touch-action:manipulation;}
.tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.tab.active{color:var(--amber);border-bottom-color:var(--amber);}

/* Content */
.content{padding:16px;max-width:720px;margin:0 auto;padding-bottom:calc(90px + env(safe-area-inset-bottom,0px));}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;}
.card-red{border-color:var(--red-bd);}
.card-ora{border-color:var(--ora-bd);}
.card-grn{border-color:var(--grn-bd);}
.card-last{margin-bottom:0;}
.slabel{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.06em;margin-bottom:10px;}

/* Stat grids */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
@media(min-width:520px){.sgrid{grid-template-columns:repeat(4,1fr);}}
.sgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.scard{background:var(--bg2);border-radius:var(--rs);padding:11px 13px;}
.sval{font-size:20px;font-weight:700;color:var(--amber2);margin:4px 0 2px;}
.sval-ora{font-size:20px;font-weight:700;color:var(--ora-t);margin:4px 0 2px;}
.sval-grn{font-size:20px;font-weight:700;color:var(--grn-t);margin:4px 0 2px;}
.slb{font-size:12px;color:var(--text2);}
.ssub{font-size:11px;color:var(--text3);margin-top:2px;}
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px;}
.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.rval{font-size:20px;font-weight:700;margin-top:5px;}
.rsub{font-size:12px;color:var(--text3);margin-top:3px;}

/* Buttons */
.bmain{width:100%;min-height:50px;padding:12px 16px;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid;touch-action:manipulation;transition:opacity .1s;}
.bmain:active{opacity:.7;}
.bmain:disabled{opacity:.35;cursor:not-allowed;}
.bmain svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.bdanger {background:var(--red-bg);border-color:var(--red-bd);color:var(--red-t);}
.bsuccess{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn-t);}
.borange {background:var(--ora-bg);border-color:var(--ora-bd);color:var(--ora-t);}
.bsm{padding:9px 18px;min-height:42px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;touch-action:manipulation;}
.bsm:active{opacity:.7;}
.bnow{padding:0 12px;height:42px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0;}
.bnow:active{opacity:.7;}
.bicon{background:transparent;border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0;}
.bicon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.byes{padding:6px 14px;min-height:36px;border-radius:var(--rs);border:1px solid var(--red-bd);background:var(--red-bg);color:var(--red-t);cursor:pointer;font-size:13px;}
.bno {padding:6px 14px;min-height:36px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;}
.bghost{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:14px;font-weight:500;padding:0;display:flex;align-items:center;gap:6px;touch-action:manipulation;}
.bghost svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.bmore{width:100%;padding:10px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;margin-top:10px;touch-action:manipulation;}
.bdel-account{padding:9px 18px;min-height:42px;border-radius:var(--rs);border:1px solid var(--red-bd);background:transparent;color:var(--red-t);font-size:13px;font-weight:500;cursor:pointer;touch-action:manipulation;}

/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;touch-action:manipulation;transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.fab:active{transform:scale(.9);}
.fab-on{background:#f59e0b;color:#0f172a;}
.fab-off{background:#b91c1c;color:#fca5a5;}
.fab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Profile overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:600px){.overlay{align-items:center;}}
.overlay-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;}
@media(min-width:600px){.overlay-card{border-radius:var(--r);}}
.overlay-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.overlay-title{font-size:16px;font-weight:600;}

/* Danger zone */
.danger-zone{border:1px solid var(--red-bd);border-radius:var(--rs);padding:12px 14px;margin-top:16px;}
.danger-title{font-size:11px;font-weight:700;color:var(--red-t);letter-spacing:.06em;margin-bottom:6px;}
.danger-desc{font-size:12px;color:var(--text2);margin-bottom:10px;}

/* Forms */
.field{margin-bottom:12px;}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
.field input{width:100%;padding:9px 12px;min-height:42px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);}
.field input:focus{outline:none;border-color:var(--amber);}
input[type=date],input[type=time]{color-scheme:dark;}

/* Time row with Now button */
.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.trow-now{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-bottom:12px;}
.trow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:480px){.trow3{grid-template-columns:1fr 1fr;}.trow3 .field:last-child{grid-column:1/-1;}}
.ff label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
.ff input{width:100%;padding:9px 10px;min-height:42px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle{width:42px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--amber);}
.toggle.off{background:var(--bg3);}
.toggle::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:white;transition:left .2s;}
.toggle.on::after{left:21px;}
.toggle.off::after{left:3px;}

/* Active banner */
.abanner{padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--rs);margin-bottom:14px;}
.abanner .al{font-size:13px;color:var(--red-t);}
.abanner .ad{font-size:20px;font-weight:700;color:var(--red-t);margin-top:3px;}

/* Bar chart */
.barwrap{display:flex;align-items:flex-end;height:48px;gap:2px;margin-bottom:8px;}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bcol .b{width:100%;border-radius:2px;}
.bcol .bl{font-size:9px;color:var(--text3);}

/* Predict */
.prow{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:var(--rs);margin-bottom:2px;}
.prow.now{background:rgba(255,255,255,.05);}
.phour{width:46px;font-size:12px;color:var(--text3);flex-shrink:0;}
.phour.now{color:var(--amber);font-weight:600;}
.ptrack{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;}
.ppct{width:32px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;}
.plabel{width:68px;font-size:11px;text-align:right;flex-shrink:0;}
@media(max-width:400px){.plabel{display:none;}}

/* Heatmap */
.hmwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.hm{min-width:320px;}
.hmrow{display:flex;align-items:center;margin-bottom:3px;}
.hmday{width:26px;font-size:10px;color:var(--text3);flex-shrink:0;}
.hmday.today{color:var(--amber);font-weight:700;}
.hmcells{display:flex;gap:2px;flex:1;}
.hmcell{flex:1;height:18px;border-radius:2px;}
.hmcell.now{outline:2px solid var(--amber);outline-offset:1px;}
.hmhours{display:flex;margin-left:26px;margin-bottom:4px;}
.hmhours span{flex:1;font-size:10px;color:var(--text3);text-align:center;}
.hmleg{display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:flex-end;}
.legbox{width:10px;height:10px;border-radius:2px;}

/* History */
.hlist{display:flex;flex-direction:column;gap:8px;}
.hitem{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:10px;}
.hitem-fluc{border-color:var(--ora-bd);background:rgba(67,20,7,.25);}
.hmeta{flex:1;min-width:0;}
.hdate{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.htime{font-size:13px;color:var(--text2);margin-top:2px;}
.hdur{font-weight:700;font-size:16px;color:var(--amber2);text-align:right;flex-shrink:0;}
.hdur-fluc{font-size:18px;color:var(--ora-t);text-align:right;flex-shrink:0;}
.hactive{font-size:11px;color:#f87171;font-weight:400;}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em;}
.tag-fluc{background:var(--ora-bg);color:var(--ora-t);border:1px solid var(--ora-bd);}

/* Community */
.comm-user{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.comm-user:last-child{border-bottom:none;}
.comm-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite;flex-shrink:0;}
.comm-city-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.comm-city-row:last-child{border-bottom:none;}
.comm-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.comm-bar-fill{height:100%;border-radius:3px;background:var(--red-bd);}

/* Forecast */
.forecast-card{background:linear-gradient(135deg,rgba(30,41,59,.95),rgba(15,23,42,.95));border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;}

/* Misc */
.empty{text-align:center;padding:40px 24px;color:var(--text3);}
.empty svg{width:36px;height:36px;stroke:currentColor;fill:none;stroke-width:1.2;margin:0 auto 10px;display:block;}
.empty p{font-size:14px;}
.infobox{margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:var(--rs);font-size:12px;color:var(--text2);}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Icons ────────────────────────────────────────────────────
const I={
  bolt:    `<svg viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  boltOff: `<svg viewBox="0 0 24 24"><line x1="2" y1="2" x2="22" y2="22"/><path d="M11.5 4H13L12 10h7L12 21v-7H5z"/></svg>`,
  bulb:    `<svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/></svg>`,
  dash:    `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
  plus:    `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
  predict: `<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  history: `<svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/></svg>`,
  users:   `<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  trash:   `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
  zap:     `<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  chevD:   `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`,
  chevU:   `<svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>`,
  x:       `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  download:`<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  clock:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  plugX:   `<svg viewBox="0 0 24 24"><path d="M12 22V11M5 11l-.75-3M19 11l.75-3M8 11V5h8v6"/><line x1="3" y1="3" x2="21" y2="21"/></svg>`,
  logout:  `<svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  warn:    `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

// ── Utils ────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const uuid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const fmtDur = m => { if(!m||m<=0)return'0m'; const h=Math.floor(m/60),mn=Math.round(m%60); return h&&mn?`${h}h ${mn}m`:h?`${h}h`:`${mn}m`; };
const fmtDate = iso => { if(!iso)return''; return new Date(iso).toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit',year:'2-digit'}); };
const fmtTime = iso => { if(!iso)return''; const d=new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const nowDate = () => { const d=new Date(); return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const nowTime = () => { const d=new Date(); return`${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const DAYS_S = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_F = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

// ── API ──────────────────────────────────────────────────────
const OPTS = { credentials: 'same-origin' };
const api = {
  get:  url        => fetch(url, OPTS).then(r => { if(!r.ok) throw r; return r.json(); }),
  post: (url,body) => fetch(url, { ...OPTS, method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }),
  put:  (url,body) => fetch(url, { ...OPTS, method:'PUT',  headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }),
  del:  url        => fetch(url, { ...OPTS, method:'DELETE' }),
};

// ── Inference ────────────────────────────────────────────────
function getSlots(o){ const s=[],cur=new Date(o.start);cur.setMinutes(0,0,0);const end=new Date(o.end);while(cur<end){s.push({day:cur.getDay(),hour:cur.getHours()});cur.setHours(cur.getHours()+1);}return s; }

function buildHeatmap(outages){
  const done=outages.filter(o=>o.start&&o.end&&(o.type||'corte')==='corte');
  if(!done.length)return null;
  const dates=done.flatMap(o=>[new Date(o.start),new Date(o.end)]);
  const minDate=new Date(Math.min(...dates.map(d=>d.getTime())));
  const obs={},hits={};
  const cur=new Date(minDate);cur.setHours(0,0,0,0);
  while(cur<=new Date()){for(let h=0;h<24;h++){const k=`${cur.getDay()}_${h}`;obs[k]=(obs[k]||0)+1;}cur.setDate(cur.getDate()+1);}
  done.forEach(o=>getSlots(o).forEach(({day,hour})=>{const k=`${day}_${hour}`;hits[k]=(hits[k]||0)+1;}));
  const hm={};
  for(let d=0;d<7;d++)for(let h=0;h<24;h++){const k=`${d}_${h}`,ob=obs[k]||0,hi=hits[k]||0;hm[k]={prob:ob>0?(hi+.5)/(ob+1):0,conf:Math.min(ob/8,1),hits:hi,obs:ob};}
  return hm;
}

// Average duration of cuts that started at each hour (for duration estimates)
function avgDurationByStartHour(outages){
  const cortes=outages.filter(o=>o.start&&o.end&&(o.type||'corte')==='corte'&&o.duration_minutes>0);
  const byH={};
  cortes.forEach(o=>{const h=new Date(o.start).getHours();if(!byH[h])byH[h]=[];byH[h].push(o.duration_minutes);});
  const result={};
  Object.entries(byH).forEach(([h,arr])=>{ result[+h]=arr.reduce((a,b)=>a+b,0)/arr.length; });
  return result;
}

const dp=(p,c)=>c<0.15?0:p*c;
const rc=p=>p<0.05?'#475569':p<0.2?'#639922':p<0.4?'#d97706':p<0.6?'#e24b4a':'#b91c1c';
const rl=(p,c)=>c<0.15?'Sin datos':p<0.05?'Sin riesgo':p<0.2?'Bajo':p<0.4?'Moderado':p<0.6?'Alto':'Muy alto';

function getDayForecast(todayPreds, outages){
  const hasData=todayPreds.some(p=>p.conf>=0.15);
  if(!hasData)return{type:'nodata'};
  const risky=todayPreds.filter(({prob,conf})=>dp(prob,conf)>=0.18);
  if(!risky.length)return{type:'safe'};

  const ranges=[];let rs=null,re=null;
  risky.forEach(({hour})=>{ if(rs===null){rs=hour;re=hour;}else if(hour===re+1){re=hour;}else{ranges.push([rs,re]);rs=hour;re=hour;} });
  if(rs!==null)ranges.push([rs,re]);

  const peak=risky.reduce((mx,p)=>dp(p.prob,p.conf)>dp(mx.prob,mx.conf)?p:mx,risky[0]);
  const rText=ranges.map(([s,e])=>s===e?`las ${pad(s)}:00`:`las ${pad(s)}:00–${pad(e+1)}:00`);
  const joined=rText.length===1?rText[0]:rText.slice(0,-1).join(', ')+' y '+rText.slice(-1);

  // Duration estimate: average historical duration of cuts starting in risky hours
  const durByHour=avgDurationByStartHour(outages);
  const riskHours=risky.map(p=>p.hour);
  const relevantDurs=riskHours.filter(h=>durByHour[h]).map(h=>durByHour[h]);
  const avgDur=relevantDurs.length>0?Math.round(relevantDurs.reduce((a,b)=>a+b,0)/relevantDurs.length):null;

  return{
    type:'risk',
    text:`Es probable que se vaya la luz entre ${joined}.`,
    peakH:peak.hour,
    peakP:Math.round(dp(peak.prob,peak.conf)*100),
    peakLevel:peak.prob<0.4?'moderado':'alto',
    avgDur,
    ranges,
  };
}

function calcStats(outages){
  const now=new Date();
  const sow=new Date(now);sow.setDate(now.getDate()-now.getDay());sow.setHours(0,0,0,0);
  const sod=new Date(now);sod.setHours(0,0,0,0);
  const som=new Date(now.getFullYear(),now.getMonth(),1);
  const cortes=outages.filter(o=>o.start&&o.end&&(o.type||'corte')==='corte'&&o.duration_minutes!=null);
  const flucs=outages.filter(o=>(o.type||'corte')==='fluctuacion');
  const sum=arr=>arr.reduce((s,o)=>s+(o.duration_minutes||0),0);
  const tw=cortes.filter(o=>new Date(o.start)>=sow);
  const tm=cortes.filter(o=>new Date(o.start)>=som);
  const ty=cortes.filter(o=>new Date(o.start)>=new Date(now.getFullYear(),0,1));
  const longest=cortes.reduce((mx,o)=>(o.duration_minutes||0)>(mx?.duration_minutes||0)?o:mx,null);
  const byDay={};
  cortes.forEach(o=>{const dk=new Date(o.start).toDateString();if(!byDay[dk])byDay[dk]={mins:0,count:0,date:new Date(o.start)};byDay[dk].mins+=o.duration_minutes||0;byDay[dk].count++;});
  const worst=Object.values(byDay).sort((a,b)=>b.mins-a.mins)[0]||null;
  const byH={};cortes.forEach(o=>getSlots(o).forEach(({hour})=>{byH[hour]=(byH[hour]||0)+1;}));
  const phE=Object.entries(byH).sort((a,b)=>b[1]-a[1])[0];
  const totalDays=cortes.length>0?Math.max(1,Math.ceil((now-new Date(Math.min(...cortes.map(o=>new Date(o.start).getTime()))))/86400000)):1;
  return{wM:sum(tw),wC:tw.length,mM:sum(tm),mC:tm.length,yM:sum(ty),yC:ty.length,longest,worst,
    peakH:phE?+phE[0]:null,avg:sum(cortes)/totalDays,
    ftd:flucs.filter(o=>new Date(o.start)>=sod).length,
    ftw:flucs.filter(o=>new Date(o.start)>=sow).length,
    ftm:flucs.filter(o=>new Date(o.start)>=som).length};
}

async function startOut(){
  const iso = new Date(`${S.startDate}T${S.startTime}`).toISOString();
  const o = {id:uuid(), start:iso};
  await api.post('/api/active', o); S.active = o;
  S.endDate = nowDate(); S.endTime = nowTime();  // pre-fill end with now
  render();
}
async function endOut(){
  if(!S.active) return;
  const end = new Date(`${S.endDate}T${S.endTime}`), start = new Date(S.active.start);
  if(end <= start) return alert(`La hora de regreso (${S.endTime}) debe ser posterior a la hora de salida (${fmtTime(S.active.start)}). Usa el botón "Ahora" para sincronizar.`);
  const completed = {...S.active, end:end.toISOString(), duration_minutes:(end-start)/60000, type:'corte'};
  const [r1] = await Promise.all([api.post('/api/outages', completed), api.del('/api/active')]);
  if(!r1.ok){ alert('Error al guardar el corte. Reintenta.'); return; }
  S.outages.unshift(completed); S.active = null;
  S.endDate = nowDate(); S.endTime = nowTime(); render();
}
async function logFluc(){
  if(S.active){
    alert('No es posible registrar una fluctuación mientras hay un corte activo. Si la luz regresó brevemente y se fue de nuevo, registra primero el regreso del corte anterior.');
    return;
  }
  const iso = new Date(`${S.startDate}T${S.startTime}`).toISOString();
  const o = {id:uuid(), start:iso, end:iso, duration_minutes:0, type:'fluctuacion'};
  const r = await api.post('/api/outages', o);
  if(!r.ok){ alert('Error al registrar. Reintenta.'); return; }
  S.outages.unshift(o); S.outages.sort((a,b)=>new Date(b.start)-new Date(a.start));
  const btn = document.getElementById('fluc-btn');
  if(btn){btn.textContent='✓ Registrada';btn.disabled=true;btn.style.opacity='.6';setTimeout(render,1200);}
  else render();
}
async function addManual(){
  const {manualDate:d,manualStart:st,manualEnd:en} = S;
  if(!d||!st||!en) return alert('Completa todos los campos');
  const s = new Date(`${d}T${st}`), e = new Date(`${d}T${en}`);
  if(isNaN(s)||isNaN(e)||e<=s) return alert('La hora de fin debe ser posterior al inicio');
  const o = {id:uuid(), start:s.toISOString(), end:e.toISOString(), duration_minutes:(e-s)/60000, type:'corte'};
  const r = await api.post('/api/outages', o);
  if(!r.ok){ alert('Error al guardar. Reintenta.'); return; }
  S.outages.unshift(o); S.outages.sort((a,b)=>new Date(b.start)-new Date(a.start));
  S.manualStart=''; S.manualEnd=''; S.showManual=false; render();
}

  S.outages = S.outages.filter(o=>o.id!==id); S.deleteId = null; render();
}

        .map(([lb,val,sub])=>`<div class="scard"><div class="sval">${val}</div><div class="slb">${lb}</div><div class="ssub">${sub}</div></div>`).join('')}

  if(tab==='log'){

      <div class="slabel" style="color:var(--ora-t)">REGISTRAR FLUCTUACIÓN</div>
      ${flucDisabled
        ? `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(239,68,68,.1);border-radius:var(--rs);margin-bottom:10px;font-size:13px;color:var(--red-t)">${I.warn.replace('<svg','<svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5"')} No se pueden registrar fluctuaciones con un corte activo.</div>`
        : `<p style="font-size:13px;color:var(--text2);margin-bottom:10px">Bajón, pico o microcorte que disparó el protector (&lt;1 min).</p>
           <div class="trow">
             <div class="ff"><label>Fecha</label><input type="date" value="${S.startDate}" onchange="setS('startDate',this.value)"></div>
             <div class="ff"><label>Hora</label><input type="time" value="${S.startTime}" onchange="setS('startTime',this.value)"></div>
           </div>`}
      <button id="fluc-btn" class="bmain borange" ${flucDisabled?'disabled onclick="return false"':'onclick="logFluc()"'}>${I.zap}Registrar fluctuación</button>
    </div>

    <div class="card card-last">
      <button class="bghost" onclick="toggle('showManual')">${S.showManual?I.chevU:I.chevD}Registrar corte pasado completo</button>`;
    if(showManual){
      const dur=S.manualStart&&S.manualEnd&&S.manualDate?(new Date(`${S.manualDate}T${S.manualEnd}`)-new Date(`${S.manualDate}T${S.manualStart}`))/60000:0;
      h+=`<div style="margin-top:14px">
        <div class="trow3">
          <div class="field" style="margin:0"><label>Fecha</label><input type="date" value="${S.manualDate}" onchange="setS('manualDate',this.value)"></div>
          <div class="field" style="margin:0"><label>Inicio</label><input type="time" value="${S.manualStart}" onchange="setS('manualStart',this.value)"></div>
          <div class="field" style="margin:0"><label>Fin</label><input type="time" value="${S.manualEnd}" onchange="setS('manualEnd',this.value)"></div>
        </div>
        ${dur>0?`<div style="font-size:12px;color:#94a3b8;margin-bottom:10px">Duración: ${fmtDur(dur)}</div>`:''}
        <button class="bsm" onclick="addManual()">Guardar</button>
      </div>`;
    }
    h+=`</div>`;
  }

  // PREDICCIÓN
  if(tab==='predict'){
    if(!hm){h+=`<div class="empty">${I.predict}<p>Necesitas al menos 1 corte para ver predicciones.</p></div>`;}
    else{
      h+=`<div class="card">
        <div class="slabel">HOY — ${DAYS_F[now.getDay()].toUpperCase()} — RIESGO POR HORA</div>`;
      todayP.filter(p=>p.hour>=5&&p.hour<=23).forEach(({hour,prob,conf})=>{
        const p=dp(prob,conf),isN=hour===now.getHours();
        const durByHour=avgDurationByStartHour(outages);
        const estDur=durByHour[hour];
        h+=`<div class="prow ${isN?'now':''}">
          <div class="phour ${isN?'now':''}">${pad(hour)}:00${isN?' ◀':''}</div>
          <div class="ptrack"><div class="pfill" style="width:${Math.round(p*100)}%;background:${rc(p)}"></div></div>
          <div class="ppct">${prob>0&&conf>=0.15?Math.round(p*100)+'%':'—'}</div>
          <div class="plabel" style="color:${rc(p)}">${rl(p,conf)}${estDur&&p>=0.18?` ~${fmtDur(estDur)}`:''}</div>
        </div>`;
      });
      h+=`</div>
      <div class="card card-last">
        <div class="slabel">MAPA DE CALOR SEMANAL</div>
        <div class="hmwrap"><div class="hm">
          <div class="hmhours">${[0,4,8,12,16,20].map(x=>`<span>${pad(x)}</span>`).join('')}</div>
          ${DAYS_S.map((day,di)=>`<div class="hmrow"><div class="hmday ${di===now.getDay()?'today':''}">${day}</div><div class="hmcells">${Array.from({length:24},(_,h2)=>{const d=hm[`${di}_${h2}`]||{prob:0,conf:0},p=dp(d.prob,d.conf),isN=di===now.getDay()&&h2===now.getHours();return`<div class="hmcell ${isN?'now':''}" title="${day} ${pad(h2)}:00 — ${Math.round(p*100)}%" style="background:${p<0.03?'rgba(255,255,255,.05)':`rgba(239,68,68,${Math.min(p*2,0.9)})`}"></div>`;}).join('')}</div></div>`).join('')}
          <div class="hmleg"><span style="font-size:10px;color:#475569">Riesgo:</span>${[['Bajo','0.2'],['Medio','0.5'],['Alto','0.85']].map(([l,o])=>`<div style="display:flex;align-items:center;gap:3px"><div class="legbox" style="background:rgba(239,68,68,${o})"></div><span style="font-size:10px;color:#475569">${l}</span></div>`).join('')}</div>
          <div class="infobox">Solo cortes alimentan el modelo. La columna de duración estimada (~Xh) aparece en horas con riesgo real.</div>
        </div></div>
      </div>`;
    }
  }

  // COMUNIDAD
  if(tab==='community'){
    if(!CM.data&&!CM.loading){ loadCommunity(); h+=`<div class="empty"><p>Cargando...</p></div>`; }
    else if(CM.loading){ h+=`<div class="empty"><p>Cargando comunidad...</p></div>`; }
    else{
      const {active:ca,todayByCity,cityUsers,totals}=CM.data;
      const myCity=A.user?.city||'';
      h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="scard"><div class="sval-grn">${totals.total_users}</div><div class="slb">Usuarios registrados</div></div>
        <div class="scard"><div class="${totals.active_now>0?'sval-ora':'sval-grn'}">${totals.active_now}</div><div class="slb">Sin luz ahora</div></div>
      </div>`;
      if(ca.length){
        h+=`<div class="card" style="margin-bottom:12px"><div class="slabel">SIN LUZ AHORA</div>`;
        ca.forEach(u=>{
          const mins=(now-new Date(u.start_time))/60000;
          h+=`<div class="comm-user"><div class="comm-dot"></div><div style="flex:1"><div style="font-size:14px;font-weight:600">@${u.username}${u.username===A.user?.username?' <span style="color:var(--amber);font-size:11px">(tú)</span>':''}</div><div style="font-size:12px;color:var(--text2)">${u.city}${u.zone?' &middot; '+u.zone:''}</div></div><div style="font-size:13px;font-weight:600;color:var(--red-t)">${fmtDur(mins)}</div></div>`;
        });
        h+=`</div>`;
      } else {
        h+=`<div class="card card-grn" style="margin-bottom:12px"><div style="font-size:14px;color:var(--grn-t)">&#10003; Nadie sin luz ahora mismo.</div></div>`;
      }
      if(todayByCity.length){
        const maxMins=Math.max(...todayByCity.map(r=>r.total_mins));
        h+=`<div class="card card-last"><div class="slabel">HOY POR CIUDAD</div>`;
        todayByCity.forEach(r=>{
          const pct=maxMins>0?Math.round(r.total_mins/maxMins*100):0;
          h+=`<div class="comm-city-row"><div style="width:80px;font-size:13px;font-weight:${r.city===myCity?700:400};color:${r.city===myCity?'var(--amber)':'var(--text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.city}</div><div class="comm-bar-track"><div class="comm-bar-fill" style="width:${pct}%"></div></div><div style="width:58px;text-align:right;font-size:12px;color:var(--text2)">${fmtDur(r.total_mins)}</div><div style="width:50px;text-align:right;font-size:11px;color:var(--text3)">${r.cortes} corte${r.cortes!==1?'s':''}</div></div>`;
        });
        h+=`</div>`;
      }
    }
    h+=`<button class="bmore" onclick="loadCommunity()">&#8635; Actualizar</button>`;
  }

  // HISTORIAL
  if(tab==='history'){
    const cortes=outages.filter(o=>o.end&&(o.type||'corte')==='corte');
    const flucs=outages.filter(o=>(o.type||'corte')==='fluctuacion');
    const totalMins=cortes.reduce((s,o)=>s+(o.duration_minutes||0),0);
    h+=`<div style="font-size:13px;color:#94a3b8;margin-bottom:12px">${cortes.length} corte${cortes.length!==1?'s':''} &middot; ${fmtDur(totalMins)} sin luz &nbsp;&middot;&nbsp; ${flucs.length} fluctuación${flucs.length!==1?'es':''}</div>`;
    if(!outages.length){h+=`<div class="empty">${I.history}<p>Sin registros aún.</p></div>`;}
    else{
      const visible=outages.slice(0,S.histPage*PAGE);
      const hasMore=outages.length>visible.length;
      h+=`<div class="hlist">`;
      visible.forEach(o=>{
        const isFluc=(o.type||'corte')==='fluctuacion';
        const am=active&&o.id===active.id?(now-new Date(o.start))/60000:0;
        h+=`<div class="hitem ${isFluc?'hitem-fluc':''}">
          <div class="hmeta">
            <div class="hdate">${fmtDate(o.start)}${isFluc?`<span class="tag tag-fluc">FLUCTUACIÓN</span>`:''}</div>
            <div class="htime">${fmtTime(o.start)}${!isFluc?` &ndash; ${o.end?fmtTime(o.end):'en curso'}`:''}</div>
          </div>
          ${isFluc?`<div class="hdur-fluc">&#9889;</div>`:`<div class="hdur">${o.end?fmtDur(o.duration_minutes):fmtDur(am)}${!o.end?'<div class="hactive">en curso</div>':''}</div>`}
          ${deleteId===o.id
            ?`<div style="display:flex;gap:4px"><button class="byes" onclick="deleteOutage('${o.id}')">Sí</button><button class="bno" onclick="cancelDel()">No</button></div>`
            :`<button class="bicon" onclick="askDel('${o.id}')">${I.trash}</button>`}
        </div>`;
      });
      h+=`</div>`;
      if(hasMore) h+=`<button class="bmore" onclick="loadMore()">Cargar ${Math.min(outages.length-visible.length,PAGE)} más &nbsp;&middot;&nbsp; ${outages.length-visible.length} restantes</button>`;
    }
  }

  h+=`</div>`;

  // PROFILE OVERLAY
  if(P.open){
    h+=`<div class="overlay" onclick="if(event.target.classList.contains('overlay')){P.open=false;render()}">
      <div class="overlay-card">
        <div class="overlay-header">
          <div class="overlay-title">@${A.user.username}</div>
          <button class="bicon" onclick="P.open=false;render()">${I.x}</button>
        </div>`;
    if(P.loading){h+=`<p style="color:var(--text3);font-size:14px">Cargando...</p>`;}
    else if(P.profile){
      const st=P.profile.stats;
      h+=`<div class="sgrid3" style="margin-bottom:16px">
        <div class="scard"><div class="sval" style="font-size:16px">${st.total_cortes}</div><div class="slb">Cortes</div></div>
        <div class="scard"><div class="sval" style="font-size:16px">${fmtDur(st.total_mins)}</div><div class="slb">Sin luz</div></div>
        <div class="scard"><div class="sval-ora" style="font-size:16px">${st.total_flucs}</div><div class="slb">Fluctuac.</div></div>
      </div>
      <div class="trow" style="margin-bottom:12px">
        <div class="field" style="margin:0"><label>Ciudad</label><input value="${P.editCity}" oninput="P.editCity=this.value" placeholder="Caracas"></div>
        <div class="field" style="margin:0"><label>Zona</label><input value="${P.editZone}" oninput="P.editZone=this.value" placeholder="Zona Norte"></div>
      </div>
      <div class="toggle-row" style="margin-bottom:14px">
        <div><div style="font-size:14px">Perfil público</div><div style="font-size:12px;color:var(--text2)">Tu actividad es visible en Comunidad</div></div>
        <button class="toggle ${P.editPublic?'on':'off'}" onclick="P.editPublic=!P.editPublic;render()"></button>
      </div>
      <details style="margin-bottom:14px"><summary style="cursor:pointer;font-size:13px;color:var(--text2);padding:8px 0">Cambiar contraseña</summary>
        <div style="margin-top:10px">
          <div class="field"><label>Contraseña actual</label><input type="password" value="${P.pwCurrent}" oninput="P.pwCurrent=this.value"></div>
          <div class="field"><label>Nueva contraseña</label><input type="password" value="${P.pwNew}" oninput="P.pwNew=this.value"></div>
          ${P.pwErr?`<div class="auth-err">${P.pwErr}</div>`:''}
          ${P.pwOk?`<div style="color:var(--grn-t);font-size:13px;margin-bottom:8px">&#10003; Contraseña actualizada</div>`:''}
        </div>
      </details>
      ${P.saveOk?`<div style="color:var(--grn-t);font-size:13px;margin-bottom:10px">&#10003; Cambios guardados</div>`:''}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
        <button class="bsm" onclick="saveProfile()">Guardar cambios</button>
        <a href="/api/export" download style="text-decoration:none"><button class="bsm">${I.download} Exportar CSV</button></a>
        <button class="bsm" style="color:var(--red-t);border-color:var(--red-bd)" onclick="doLogout()">${I.logout} Cerrar sesión</button>
      </div>
      <div class="danger-zone">
        <div class="danger-title">ZONA DE PELIGRO</div>
        <div class="danger-desc">Borrar cuenta elimina permanentemente tu usuario y todos tus registros de la base de datos. Esta acción no se puede deshacer.</div>
        ${P.confirmDelete
          ?`<div style="font-size:13px;color:var(--red-t);margin-bottom:8px;font-weight:600">¿Estás seguro? Se borrarán ${st.total_cortes} cortes y ${st.total_flucs} fluctuaciones.</div>
            <div style="display:flex;gap:8px">
              <button class="byes" onclick="deleteAccount()">Sí, borrar todo</button>
              <button class="bno" onclick="P.confirmDelete=false;render()">Cancelar</button>
            </div>`
          :`<button class="bdel-account" onclick="deleteAccount()">Borrar mi cuenta</button>`}
      </div>`;
    }
    h+=`</div></div>`;
  }

  return h;
}

// ── Helpers ──────────────────────────────────────────────────
function setTab(t){ S.tab=t; S.deleteId=null; S.histPage=1; S.startDate=nowDate(); S.startTime=nowTime(); if(t==='community'&&!CM.data)loadCommunity(); render(); }
function toggle(k){ S[k]=!S[k]; render(); }
function setS(k,v){ S[k]=v; render(); }
function setA(k,v){ A[k]=v; A.authErr=''; render(); }
function askDel(id){ S.deleteId=id; render(); }
function cancelDel(){ S.deleteId=null; render(); }
function loadMore(){ S.histPage++; render(); }
function syncEndNow(){ S.endDate=nowDate(); S.endTime=nowTime(); render(); }

init();
</script>
</body>
</html>
