<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Cortes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
    --border: #334155; --amber: #f59e0b; --amber2: #fbbf24;
    --red: #ef4444; --red-bg: #450a0a; --red-border: #b91c1c;
    --green: #22c55e; --green-bg: #052e16; --green-border: #15803d;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: inherit; }

  /* Header */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .status-badge { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  .badge-on { background: var(--green-bg); border: 1px solid var(--green-border); color: #86efac; }
  .badge-off { background: var(--red-bg); border: 1px solid var(--red-border); color: #fca5a5; }
  .badge-on .dot { background: var(--green); }
  .badge-off .dot { background: var(--red); animation: pulse 1.5s infinite; }

  /* Tabs */
  .tabs { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
  .tab { flex: 1; min-width: 70px; padding: 10px 6px; border: none; background: transparent; color: var(--text2); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; border-bottom: 2px solid transparent; font-size: 11px; font-weight: 500; transition: color .15s; }
  .tab i { font-size: 18px; }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* Content */
  .content { padding: 16px; max-width: 720px; margin: 0 auto; }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .card-danger { border-color: var(--red-border); }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: .05em; margin-bottom: 10px; }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat-card i { font-size: 16px; color: var(--text2); }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--amber2); margin: 6px 0 2px; }
  .stat-label { font-size: 12px; color: var(--text2); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Record cards grid */
  .records-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .record-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .record-val { font-size: 24px; font-weight: 700; margin-top: 6px; }
  .record-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* Buttons */
  .btn-main { width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid; transition: opacity .15s; }
  .btn-main:hover { opacity: .85; }
  .btn-danger { background: var(--red-bg); border-color: var(--red-border); color: #fca5a5; }
  .btn-success { background: var(--green-bg); border-color: var(--green-border); color: #86efac; }
  .btn-sm { padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-icon { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text3); cursor: pointer; padding: 4px 8px; }
  .btn-confirm-yes { padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--red-border); background: var(--red-bg); color: #fca5a5; cursor: pointer; font-size: 12px; }
  .btn-confirm-no { padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; }
  .btn-ghost { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 14px; font-weight: 500; padding: 0; display: flex; align-items: center; gap: 6px; }

  /* Active outage banner */
  .active-banner { padding: 10px 14px; background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius-sm); margin-bottom: 14px; }
  .active-banner .label { font-size: 13px; color: #fca5a5; }
  .active-banner .dur { font-size: 20px; font-weight: 700; color: #fca5a5; margin-top: 4px; }

  /* Manual form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .form-field input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); color: var(--text); }
  input[type=date], input[type=time] { color-scheme: dark; }

  /* Today bar */
  .bar-wrap { display: flex; align-items: flex-end; height: 52px; gap: 2px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar-col .bar { width: 100%; border-radius: 2px; }
  .bar-col .bar-label { font-size: 9px; color: var(--text3); }

  /* Predict list */
  .predict-row { display: flex; align-items: center; gap: 10px; padding: 5px 8px; border-radius: var(--radius-sm); margin-bottom: 2px; }
  .predict-row.now { background: rgba(255,255,255,.05); }
  .predict-hour { width: 44px; font-size: 12px; color: var(--text3); }
  .predict-hour.now { color: var(--amber); font-weight: 600; }
  .predict-bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .predict-bar-fill { height: 100%; border-radius: 3px; }
  .predict-pct { width: 32px; font-size: 12px; color: var(--text2); text-align: right; }
  .predict-label { width: 70px; font-size: 11px; text-align: right; }

  /* Heatmap */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap { min-width: 360px; }
  .heatmap-row { display: flex; align-items: center; margin-bottom: 3px; }
  .heatmap-day { width: 28px; font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .heatmap-day.today { color: var(--amber); font-weight: 700; }
  .heatmap-cells { display: flex; gap: 2px; flex: 1; }
  .heatmap-cell { flex: 1; height: 18px; border-radius: 2px; }
  .heatmap-cell.now-cell { outline: 2px solid var(--amber); outline-offset: 1px; }
  .heatmap-hours { display: flex; margin-left: 28px; margin-bottom: 4px; }
  .heatmap-hours span { flex: 1; font-size: 10px; color: var(--text3); text-align: center; }
  .heatmap-legend { display: flex; align-items: center; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .legend-box { width: 10px; height: 10px; border-radius: 2px; }

  /* History */
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .history-meta { flex: 1; }
  .history-date { font-weight: 600; font-size: 14px; }
  .history-time { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .history-dur { font-weight: 700; font-size: 16px; color: var(--amber2); text-align: right; }
  .history-active { font-size: 11px; color: #f87171; font-weight: 400; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty i { font-size: 40px; display: block; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Utility */
  .gap-10 { gap: 10px; }
  .mt-10 { margin-top: 10px; }
  .mt-14 { margin-top: 14px; }
  .mb-14 { margin-bottom: 14px; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .info-box { margin-top: 8px; padding: 8px 10px; background: rgba(255,255,255,.04); border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @media(max-width:480px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const uuid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

const fmtDur = m => {
  if (!m || m <= 0) return '0m';
  const h = Math.floor(m / 60), mn = Math.round(m % 60);
  return h && mn ? `${h}h ${mn}m` : h ? `${h}h` : `${mn}m`;
};

const fmtDate = iso => {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { weekday:'short', day:'2-digit', month:'2-digit', year:'2-digit' });
};

const fmtTime = iso => {
  if (!iso) return '';
  const d = new Date(iso);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

const DAYS_S = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_F = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

// ─────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────
const api = {
  async getOutages()       { return (await fetch('/api/outages')).json(); },
  async addOutage(o)       { return fetch('/api/outages', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(o) }); },
  async deleteOutage(id)   { return fetch(`/api/outages/${id}`, { method:'DELETE' }); },
  async getActive()        { return (await fetch('/api/active')).json(); },
  async setActive(o)       { return fetch('/api/active', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(o) }); },
  async clearActive()      { return fetch('/api/active', { method:'DELETE' }); },
};

// ─────────────────────────────────────────────────────────────
// Inference engine
// ─────────────────────────────────────────────────────────────
function getSlots(o) {
  const s = [];
  if (!o.start || !o.end) return s;
  const cur = new Date(o.start); cur.setMinutes(0, 0, 0);
  const end = new Date(o.end);
  while (cur < end) {
    s.push({ day: cur.getDay(), hour: cur.getHours() });
    cur.setHours(cur.getHours() + 1);
  }
  return s;
}

function buildHeatmap(outages) {
  const done = outages.filter(o => o.start && o.end);
  if (!done.length) return null;

  const dates = done.flatMap(o => [new Date(o.start), new Date(o.end)]);
  const minDate = new Date(Math.min(...dates.map(d => d.getTime())));
  const maxDate = new Date();

  // Count observations per (day, hour) slot in the window
  const obs = {}, hits = {};
  const cur = new Date(minDate); cur.setHours(0, 0, 0, 0);
  while (cur <= maxDate) {
    for (let h = 0; h < 24; h++) {
      const k = `${cur.getDay()}_${h}`;
      obs[k] = (obs[k] || 0) + 1;
    }
    cur.setDate(cur.getDate() + 1);
  }

  // Count outage hits per slot
  done.forEach(o => getSlots(o).forEach(({ day, hour }) => {
    const k = `${day}_${hour}`;
    hits[k] = (hits[k] || 0) + 1;
  }));

  // Laplace-smoothed probability + confidence
  const alpha = 0.5;
  const hm = {};
  for (let d = 0; d < 7; d++) for (let h = 0; h < 24; h++) {
    const k = `${d}_${h}`;
    const ob = obs[k] || 0, hi = hits[k] || 0;
    hm[k] = {
      prob: ob > 0 ? (hi + alpha) / (ob + 2 * alpha) : 0,
      conf: Math.min(ob / 8, 1),   // confidence reaches 1.0 after 8+ observations
      hits: hi, obs: ob
    };
  }
  return hm;
}

function calcStats(outages) {
  const done = outages.filter(o => o.start && o.end && o.duration_minutes != null);
  const now = new Date();
  const sow = new Date(now); sow.setDate(now.getDate() - now.getDay()); sow.setHours(0,0,0,0);
  const som = new Date(now.getFullYear(), now.getMonth(), 1);
  const soy = new Date(now.getFullYear(), 0, 1);
  const sum = arr => arr.reduce((s, o) => s + (o.duration_minutes || 0), 0);
  const tw = done.filter(o => new Date(o.start) >= sow);
  const tm = done.filter(o => new Date(o.start) >= som);
  const ty = done.filter(o => new Date(o.start) >= soy);
  const longest = done.reduce((mx, o) => (o.duration_minutes||0) > (mx?.duration_minutes||0) ? o : mx, null);
  const byDay = {};
  done.forEach(o => {
    const dk = new Date(o.start).toDateString();
    if (!byDay[dk]) byDay[dk] = { mins: 0, count: 0, date: new Date(o.start) };
    byDay[dk].mins += o.duration_minutes || 0;
    byDay[dk].count++;
  });
  const worst = Object.values(byDay).sort((a,b) => b.mins - a.mins)[0] || null;
  const byH = {};
  done.forEach(o => getSlots(o).forEach(({hour}) => { byH[hour] = (byH[hour]||0)+1; }));
  const phE = Object.entries(byH).sort((a,b) => b[1]-a[1])[0];
  const totalDays = done.length > 0
    ? Math.max(1, Math.ceil((now - new Date(Math.min(...done.map(o => new Date(o.start).getTime())))) / 86400000))
    : 1;
  return {
    wM: sum(tw), wC: tw.length,
    mM: sum(tm), mC: tm.length,
    yM: sum(ty), yC: ty.length,
    totalMins: sum(done), totalCount: done.length,
    longest, worst, peakH: phE ? +phE[0] : null,
    avg: sum(done) / totalDays
  };
}

const dp = (prob, conf) => conf < 0.1 ? 0 : prob * conf;

function riskColor(p) {
  if (p < 0.05) return '#475569';
  if (p < 0.2)  return '#639922';
  if (p < 0.4)  return '#d97706';
  if (p < 0.6)  return '#e24b4a';
  return '#b91c1c';
}
function riskLabel(p, conf) {
  if (conf < 0.1) return 'Sin datos';
  if (p < 0.05) return 'Sin riesgo';
  if (p < 0.2)  return 'Bajo';
  if (p < 0.4)  return 'Moderado';
  if (p < 0.6)  return 'Alto';
  return 'Muy alto';
}

// ─────────────────────────────────────────────────────────────
// App state
// ─────────────────────────────────────────────────────────────
let state = {
  outages: [],
  active: null,
  tab: 'dashboard',
  showManual: false,
  manualDate: new Date().toISOString().slice(0,10),
  manualStart: '', manualEnd: '',
  deleteId: null,
  loading: true,
};

async function init() {
  const [outages, active] = await Promise.all([api.getOutages(), api.getActive()]);
  state.outages = outages;
  state.active = active;
  state.loading = false;
  render();
  setInterval(() => { if (state.active) render(); }, 15000);
}

// ─────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────
async function startOut() {
  const o = { id: uuid(), start: new Date().toISOString() };
  await api.setActive(o);
  state.active = o;
  render();
}

async function endOut() {
  if (!state.active) return;
  const end = new Date(), start = new Date(state.active.start);
  const completed = { ...state.active, end: end.toISOString(), duration_minutes: (end - start) / 60000 };
  await Promise.all([api.addOutage(completed), api.clearActive()]);
  state.outages.unshift(completed);
  state.active = null;
  render();
}

async function addManual() {
  const { manualDate: d, manualStart: st, manualEnd: en } = state;
  if (!d || !st || !en) return alert('Completa todos los campos');
  const s = new Date(`${d}T${st}`), e = new Date(`${d}T${en}`);
  if (isNaN(s) || isNaN(e) || e <= s) return alert('La hora de fin debe ser posterior al inicio');
  const o = { id: uuid(), start: s.toISOString(), end: e.toISOString(), duration_minutes: (e - s) / 60000 };
  await api.addOutage(o);
  state.outages.unshift(o);
  state.outages.sort((a,b) => new Date(b.start) - new Date(a.start));
  state.manualStart = ''; state.manualEnd = ''; state.showManual = false;
  render();
}

async function deleteOutage(id) {
  await api.deleteOutage(id);
  state.outages = state.outages.filter(o => o.id !== id);
  state.deleteId = null;
  render();
}

// ─────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────
function render() {
  const now = new Date();
  const { outages, active, tab, showManual, deleteId } = state;
  const activeMins = active ? (now - new Date(active.start)) / 60000 : 0;
  const hm = buildHeatmap(outages);
  const stats = calcStats(outages);
  const todayPreds = hm ? Array.from({length:24},(_,h) => ({hour:h,...(hm[`${now.getDay()}_${h}`]||{prob:0,conf:0})})) : [];

  if (state.loading) {
    document.getElementById('app').innerHTML = `<div class="empty"><i class="ti ti-loader"></i><p>Cargando...</p></div>`;
    return;
  }

  let h = `
  <div class="header">
    <div class="header-left">
      <i class="ti ti-bolt" style="font-size:22px;color:#f59e0b"></i>
      <div>
        <div class="header-title">Monitor de cortes</div>
        <div class="header-sub">${now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
    </div>
    <div class="status-badge ${active ? 'badge-off' : 'badge-on'}">
      <div class="dot"></div>
      ${active ? `Sin luz &middot; ${fmtDur(activeMins)}` : 'Con luz'}
    </div>
  </div>

  <div class="tabs">
    ${[
      ['dashboard','ti-layout-dashboard','Dashboard'],
      ['log','ti-bolt','Registrar'],
      ['predict','ti-chart-dots','Predicciones'],
      ['history','ti-history','Historial'],
    ].map(([id,ic,lb]) =>
      `<button class="tab ${tab===id?'active':''}" onclick="setTab('${id}')">
        <i class="ti ${ic}"></i>${lb}
      </button>`
    ).join('')}
  </div>

  <div class="content">`;

  // ── DASHBOARD ──────────────────────────────────────────────
  if (tab === 'dashboard') {
    h += `<div class="stat-grid">
      ${[
        ['ti-calendar-week','Esta semana',fmtDur(stats.wM),`${stats.wC} corte${stats.wC!==1?'s':''}`],
        ['ti-calendar','Este mes',fmtDur(stats.mM),`${stats.mC} corte${stats.mC!==1?'s':''}`],
        ['ti-calendar-stats','Este año',fmtDur(stats.yM),`${stats.yC} corte${stats.yC!==1?'s':''}`],
        ['ti-trending-up','Prom. diario',fmtDur(stats.avg),'histórico'],
      ].map(([ic,lb,val,sub]) => `
        <div class="stat-card">
          <i class="ti ${ic}"></i>
          <div class="stat-val">${val}</div>
          <div class="stat-label">${lb}</div>
          <div class="stat-sub">${sub}</div>
        </div>`).join('')}
    </div>`;

    if (stats.longest || stats.worst || stats.peakH !== null) {
      h += `<div class="records-grid">`;
      if (stats.longest)
        h += `<div class="record-card"><div class="section-label">CORTE MÁS LARGO</div>
          <div class="record-val">${fmtDur(stats.longest.duration_minutes)}</div>
          <div class="record-sub">${fmtDate(stats.longest.start)} &middot; ${fmtTime(stats.longest.start)}&ndash;${fmtTime(stats.longest.end)}</div></div>`;
      if (stats.worst)
        h += `<div class="record-card"><div class="section-label">DÍA MÁS AFECTADO</div>
          <div class="record-val" style="font-size:18px">${stats.worst.date.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'})}</div>
          <div class="record-sub" style="color:var(--amber2)">${fmtDur(stats.worst.mins)} &middot; ${stats.worst.count} corte${stats.worst.count!==1?'s':''}</div></div>`;
      if (stats.peakH !== null)
        h += `<div class="record-card"><div class="section-label">HORA PICO HISTÓRICA</div>
          <div class="record-val">${pad(stats.peakH)}:00</div>
          <div class="record-sub">hora con más cortes registrados</div></div>`;
      h += `</div>`;
    }

    if (hm) {
      const curSlot = hm[`${now.getDay()}_${now.getHours()}`] || {prob:0,conf:0};
      const p0 = dp(curSlot.prob, curSlot.conf);
      h += `<div class="card mb-14">
        <div class="section-label">Probabilidad de corte hoy &mdash; ${DAYS_F[now.getDay()]}</div>
        <div class="bar-wrap">
          ${todayPreds.map(({hour,prob,conf}) => {
            const p = dp(prob,conf), isN = hour===now.getHours();
            return `<div class="bar-col">
              <div class="bar" style="height:${Math.max(3,p*48)}px;background:${isN?'#f59e0b':`rgba(239,68,68,${p*0.85+0.05})`};${isN?'outline:2px solid #f59e0b;outline-offset:1px':''}"></div>
              ${hour%6===0?`<span class="bar-label">${pad(hour)}</span>`:''}
            </div>`;
          }).join('')}
        </div>
        <div class="mt-10" style="font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px">
          <span>Ahora (${pad(now.getHours())}:00):</span>
          <span style="font-weight:600;color:${riskColor(p0)}">${riskLabel(p0,curSlot.conf)}${curSlot.conf>=0.1?' &middot; '+Math.round(p0*100)+'%':''}</span>
        </div>
      </div>`;
    }

    if (!outages.length)
      h += `<div class="empty"><i class="ti ti-plug-x"></i><p>Sin registros. Ve a <strong>Registrar</strong> para comenzar.</p></div>`;
  }

  // ── LOG ────────────────────────────────────────────────────
  if (tab === 'log') {
    h += `<div class="card ${active?'card-danger':''} mb-14">
      <div style="font-size:15px;font-weight:600;margin-bottom:14px">Control rápido</div>`;
    if (active) {
      h += `<div class="active-banner">
        <div class="label"><i class="ti ti-bolt-off"></i> Corte activo desde las ${fmtTime(active.start)}</div>
        <div class="dur">${fmtDur(activeMins)} sin luz</div>
      </div>
      <button class="btn-main btn-success" onclick="endOut()"><i class="ti ti-bulb"></i>Volvió la luz</button>`;
    } else {
      h += `<button class="btn-main btn-danger" onclick="startOut()"><i class="ti ti-bolt-off"></i>Se fue la luz</button>`;
    }
    h += `</div>

    <div class="card">
      <button class="btn-ghost" onclick="toggle('showManual')">
        <i class="ti ${showManual?'ti-chevron-up':'ti-chevron-down'}"></i>Registrar corte pasado
      </button>`;
    if (showManual) {
      const dur = state.manualStart && state.manualEnd && state.manualDate
        ? (new Date(`${state.manualDate}T${state.manualEnd}`) - new Date(`${state.manualDate}T${state.manualStart}`)) / 60000 : 0;
      h += `<div class="mt-14">
        <div class="form-grid">
          <div class="form-field"><label>Fecha</label><input type="date" value="${state.manualDate}" onchange="setS('manualDate',this.value)"></div>
          <div class="form-field"><label>Hora inicio</label><input type="time" value="${state.manualStart}" onchange="setS('manualStart',this.value)"></div>
          <div class="form-field"><label>Hora fin</label><input type="time" value="${state.manualEnd}" onchange="setS('manualEnd',this.value)"></div>
        </div>
        ${dur > 0 ? `<div style="font-size:12px;color:#94a3b8;margin-bottom:10px">Duración: ${fmtDur(dur)}</div>` : ''}
        <button class="btn-sm" onclick="addManual()">Guardar registro</button>
      </div>`;
    }
    h += `</div>`;
  }

  // ── PREDICCIONES ───────────────────────────────────────────
  if (tab === 'predict') {
    if (!hm) {
      h += `<div class="empty"><i class="ti ti-chart-dots"></i><p>Necesitas al menos 1 registro para ver predicciones.</p></div>`;
    } else {
      h += `<div class="card mb-14">
        <div class="section-label">Hoy &mdash; ${DAYS_F[now.getDay()]} &mdash; riesgo por hora</div>`;
      todayPreds.filter(p => p.hour >= 5 && p.hour <= 23).forEach(({hour,prob,conf}) => {
        const p = dp(prob,conf), isN = hour===now.getHours();
        h += `<div class="predict-row ${isN?'now':''}">
          <div class="predict-hour ${isN?'now':''}">${pad(hour)}:00${isN?' ◀':''}</div>
          <div class="predict-bar-track"><div class="predict-bar-fill" style="width:${Math.round(p*100)}%;background:${riskColor(p)}"></div></div>
          <div class="predict-pct">${conf>=0.1?Math.round(p*100)+'%':'—'}</div>
          <div class="predict-label" style="color:${riskColor(p)}">${riskLabel(p,conf)}</div>
        </div>`;
      });
      h += `</div>

      <div class="card">
        <div class="section-label">Mapa de calor semanal</div>
        <div class="heatmap-wrap"><div class="heatmap">
          <div class="heatmap-hours">${[0,4,8,12,16,20].map(x=>`<span>${pad(x)}</span>`).join('')}</div>
          ${DAYS_S.map((day,di) => `
            <div class="heatmap-row">
              <div class="heatmap-day ${di===now.getDay()?'today':''}">${day}</div>
              <div class="heatmap-cells">
                ${Array.from({length:24},(_,h2) => {
                  const d = hm[`${di}_${h2}`]||{prob:0,conf:0};
                  const p = dp(d.prob,d.conf);
                  const isNow = di===now.getDay()&&h2===now.getHours();
                  return `<div class="heatmap-cell ${isNow?'now-cell':''}" title="${day} ${pad(h2)}:00 — ${Math.round(p*100)}%"
                    style="background:${p<0.03?'rgba(255,255,255,.05)':`rgba(239,68,68,${Math.min(p*2,0.9)})`}"></div>`;
                }).join('')}
              </div>
            </div>`).join('')}
          <div class="heatmap-legend">
            <span style="font-size:10px;color:#475569">Riesgo:</span>
            ${[['Bajo','0.2'],['Medio','0.5'],['Alto','0.85']].map(([l,op])=>
              `<div style="display:flex;align-items:center;gap:3px"><div class="legend-box" style="background:rgba(239,68,68,${op})"></div><span style="font-size:10px;color:#475569">${l}</span></div>`
            ).join('')}
          </div>
          <div class="info-box">Las predicciones mejoran con más datos. Las celdas oscuras indican menos de 8 observaciones para esa combinación día/hora.</div>
        </div></div>
      </div>`;
    }
  }

  // ── HISTORIAL ──────────────────────────────────────────────
  if (tab === 'history') {
    const done = outages.filter(o => o.end);
    const totalMins = done.reduce((s,o) => s+(o.duration_minutes||0), 0);
    h += `<div style="font-size:13px;color:#94a3b8;margin-bottom:12px">
      ${done.length} registro${done.length!==1?'s':''} &middot; ${fmtDur(totalMins)} total sin luz
    </div>`;
    if (!outages.length) {
      h += `<div class="empty"><i class="ti ti-history"></i><p>Sin registros aún.</p></div>`;
    } else {
      h += `<div class="history-list">`;
      outages.forEach(o => {
        const activeMinsO = active && o.id===active.id ? (now - new Date(o.start))/60000 : 0;
        h += `<div class="history-item">
          <div class="history-meta">
            <div class="history-date">${fmtDate(o.start)}</div>
            <div class="history-time">${fmtTime(o.start)} &ndash; ${o.end?fmtTime(o.end):'en curso'}</div>
          </div>
          <div class="history-dur">
            ${o.end ? fmtDur(o.duration_minutes) : fmtDur(activeMinsO)}
            ${!o.end?'<div class="history-active">en curso</div>':''}
          </div>
          ${deleteId===o.id
            ?`<div style="display:flex;gap:4px">
                <button class="btn-confirm-yes" onclick="deleteOutage('${o.id}')">Sí</button>
                <button class="btn-confirm-no" onclick="cancelDel()">No</button>
              </div>`
            :`<button class="btn-icon" onclick="askDel('${o.id}')" title="Eliminar"><i class="ti ti-trash" style="font-size:14px"></i></button>`}
        </div>`;
      });
      h += `</div>`;
    }
  }

  h += `</div>`;
  document.getElementById('app').innerHTML = h;
}

// ─────────────────────────────────────────────────────────────
// Event helpers (called from inline onclick)
// ─────────────────────────────────────────────────────────────
function setTab(t)       { state.tab = t; state.deleteId = null; render(); }
function toggle(k)       { state[k] = !state[k]; render(); }
function setS(k, v)      { state[k] = v; render(); }
function askDel(id)      { state.deleteId = id; render(); }
function cancelDel()     { state.deleteId = null; render(); }

// Init
init();
</script>
</body>
</html>
