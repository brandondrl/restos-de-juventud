name: CI y Auto-Merge

on:
  push:
    branches: [dev]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  automerge-to-main:
    needs: quality
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Hacer merge a main y subir los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          COMMIT_MSG=$(git log -1 --format=%s origin/dev)
          git merge origin/dev --no-ff -m "Auto-merge: $COMMIT_MSG"
          git push origin main
