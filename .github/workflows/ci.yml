name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
